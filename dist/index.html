<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameCode Chat</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem('gc_theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.dataset.theme = t;
      }
    } catch (_e) { /* ignore */ }
  })();
</script>
<style>
/* ===== Tokens ===== */
:root {
  --bg: #FAFAF7;
  --bg-elev: #FFFFFF;
  --bg-sunken: #F2F1EC;
  --bg-hover: #EFEEE8;
  --border: #E6E4DC;
  --border-strong: #D4D1C7;
  --ink: #1A1A17;
  --ink-2: #4A4843;
  --ink-3: #807D74;
  --ink-4: #A8A59B;
  --accent: oklch(0.62 0.08 195);
  --accent-soft: oklch(0.94 0.025 195);
  --accent-ink: oklch(0.42 0.07 195);
  --persona-a: oklch(0.65 0.13 35);
  --persona-b: oklch(0.62 0.10 260);
  --persona-c: oklch(0.62 0.11 145);
  --persona-d: oklch(0.60 0.13 310);
  --persona-e: oklch(0.62 0.12 70);
  --danger: oklch(0.60 0.15 25);
  --code-bg: #F4F2EC;
  --code-border: #E6E4DC;
  --shadow-sm: 0 1px 2px rgba(20,18,12,0.04), 0 1px 1px rgba(20,18,12,0.03);
  --shadow-md: 0 4px 16px rgba(20,18,12,0.06), 0 2px 4px rgba(20,18,12,0.04);
  --shadow-lg: 0 16px 48px rgba(20,18,12,0.10), 0 4px 12px rgba(20,18,12,0.06);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}

[data-theme="dark"] {
  --bg: #151513;
  --bg-elev: #1D1D1A;
  --bg-sunken: #111110;
  --bg-hover: #26261F;
  --border: #2A2A24;
  --border-strong: #3B3B33;
  --ink: #ECEBE5;
  --ink-2: #BFBDB3;
  --ink-3: #908D82;
  --ink-4: #696760;
  --accent: oklch(0.72 0.09 195);
  --accent-soft: oklch(0.30 0.05 195);
  --accent-ink: oklch(0.82 0.09 195);
  --code-bg: #1A1A17;
  --code-border: #2A2A24;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.25);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.45), 0 4px 12px rgba(0,0,0,0.30);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}
#app { height: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea { font-family: inherit; color: inherit; }

/* ===== Auth ===== */
.auth-container {
  display: grid;
  place-items: center;
  height: 100vh;
  padding: 24px;
  background: var(--bg);
}
.auth-container form {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 28px 28px 24px;
  width: 100%;
  max-width: 380px;
}
.auth-container h2 {
  margin: 0 0 18px;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.auth-container input {
  width: 100%;
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 120ms ease, background 120ms ease;
}
.auth-container input:focus {
  border-color: var(--accent);
  background: var(--bg-elev);
}
.auth-container button {
  width: 100%;
  margin-top: 14px;
  padding: 10px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  transition: transform 120ms ease;
}
.auth-container button:hover:not(:disabled) { transform: translateY(-1px); }
.auth-container button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.error-message {
  background: color-mix(in oklch, var(--danger) 15%, transparent);
  color: var(--danger);
  border: 1px solid color-mix(in oklch, var(--danger) 40%, transparent);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  font-size: 13px;
}

/* ===== App layout ===== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-width, 280px) 1fr;
  height: 100vh;
  background: var(--bg);
}

.sidebar-resize {
  position: absolute;
  top: 0;
  bottom: 0;
  left: var(--sidebar-width, 280px);
  width: 6px;
  margin-left: -3px;
  cursor: ew-resize;
  user-select: none;
  z-index: 20;
}
.sidebar-resize::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 3px;
  width: 1px;
  background: transparent;
  transition: background 120ms ease;
}
.sidebar-resize:hover::after,
.sidebar-resize.dragging::after { background: var(--accent); }
body.resizing-col { cursor: ew-resize !important; user-select: none !important; }
body.resizing-col * { user-select: none !important; }

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg-sunken);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 9px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.01em;
}
.brand-mark {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: -0.04em;
}
.icon-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  display: grid; place-items: center;
  color: var(--ink-3);
  transition: background 120ms ease, color 120ms ease;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--ink); }
.icon-btn svg { width: 16px; height: 16px; }

.new-chat {
  margin: 4px 12px 14px;
  padding: 9px 12px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  box-shadow: var(--shadow-sm);
  transition: all 120ms ease;
}
.new-chat:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.new-chat-inner { display: flex; align-items: center; gap: 8px; }
.new-chat-kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--bg-sunken);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 4px;
}

.search { margin: 0 12px 10px; position: relative; }
.search input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 6px 8px 6px 28px;
  font-size: 13px;
  outline: none;
  transition: all 120ms ease;
}
.search input:focus { background: var(--bg-elev); border-color: var(--border); }
.search input::placeholder { color: var(--ink-4); }
.search > svg {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  width: 13px; height: 13px;
  color: var(--ink-4);
  pointer-events: none;
}

.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.conv-section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 14px 8px 6px;
  font-weight: 500;
}
.conv {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 1px;
  cursor: pointer;
  position: relative;
  transition: background 100ms ease;
}
.conv:hover { background: var(--bg-hover); }
.conv.active { background: var(--bg-elev); box-shadow: var(--shadow-sm); }
.conv-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--ink-4);
}
.conv-title {
  font-size: 13px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  font-weight: 450;
}
.conv.active .conv-title { font-weight: 500; }
.conv-meta {
  font-size: 10.5px;
  color: var(--ink-4);
  font-family: var(--font-mono);
}
.conv-del {
  width: 18px; height: 18px;
  border-radius: 4px;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--ink-4);
}
.conv:hover .conv-del { display: grid; }
.conv-del:hover { background: var(--bg-hover); color: var(--danger); }
.conv-del svg { width: 11px; height: 11px; }

.sidebar-foot {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.user-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 13px;
  flex: 1;
  min-width: 0;
}
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: linear-gradient(135deg, oklch(0.7 0.1 35), oklch(0.6 0.12 25));
  color: white;
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}
.user-meta { min-width: 0; }
.user-name { font-weight: 500; font-size: 13px; }
.user-status {
  font-size: 11px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: oklch(0.7 0.15 145); }
.status-dot.offline { background: var(--ink-4); }

/* ===== Main ===== */
.main {
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  position: relative;
}

.chat-header {
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  flex-shrink: 0;
  z-index: 10;
}
.chat-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.chat-title-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chat-title-meta {
  font-size: 11.5px;
  color: var(--ink-4);
  font-family: var(--font-mono);
  font-weight: 400;
  flex-shrink: 0;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px 5px 9px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 450;
  transition: all 120ms ease;
  white-space: nowrap;
  position: relative;
}
.pill:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.pill svg { width: 12px; height: 12px; color: var(--ink-3); }
.pill .chev { width: 11px; height: 11px; color: var(--ink-4); margin-left: -2px; }
.pill .dot { width: 7px; height: 7px; border-radius: 50%; }
.pill .model-text { font-family: var(--font-mono); font-size: 12px; }
.pill .provider-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  background: var(--bg-sunken);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: -2px;
}

.popover-anchor { position: relative; }

/* ===== Thread ===== */
.thread-wrap {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
  position: relative;
}
.thread {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 32px 32px;
}

.msg {
  display: flex;
  gap: 14px;
  margin-bottom: 28px;
  animation: fadeUp 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-rail {
  width: 28px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 2px;
}
.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
  flex-shrink: 0;
  letter-spacing: -0.04em;
}
.msg-avatar.user {
  background: linear-gradient(135deg, oklch(0.7 0.1 35), oklch(0.6 0.12 25));
  color: white;
}
.msg-avatar.assistant {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--ink);
}
.persona-line {
  width: 2px;
  flex: 1;
  margin-top: 8px;
  border-radius: 2px;
  opacity: 0.5;
  min-height: 12px;
}
.msg-body { flex: 1; min-width: 0; }
.msg-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12.5px;
  flex-wrap: wrap;
}
.msg-author { font-weight: 600; color: var(--ink); }
.msg-meta {
  color: var(--ink-4);
  font-family: var(--font-mono);
  font-size: 11px;
}
.msg-persona-tag {
  font-size: 11px;
  font-family: var(--font-mono);
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg-sunken);
  color: var(--ink-3);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.msg-persona-tag .dot { width: 6px; height: 6px; border-radius: 50%; }

.msg-content {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
}
.msg-content p { margin: 0 0 12px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content ul, .msg-content ol { margin: 0 0 12px; padding-left: 22px; }
.msg-content li { margin-bottom: 4px; }
.msg-content strong { font-weight: 600; }
.msg-content em { font-style: italic; }
.msg-content blockquote {
  border-left: 3px solid var(--border-strong);
  padding-left: 12px;
  margin: 0 0 12px;
  color: var(--ink-2);
}
.msg-content a { color: var(--accent-ink); text-decoration: none; }
.msg-content a:hover { text-decoration: underline; }
.msg-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.msg-content h1, .msg-content h2, .msg-content h3, .msg-content h4 {
  font-weight: 600;
  margin: 16px 0 8px;
  line-height: 1.3;
}
.msg-content h1 { font-size: 20px; }
.msg-content h2 { font-size: 17px; }
.msg-content h3 { font-size: 15px; }
.msg-content h4 { font-size: 14px; }
.inline-code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--code-bg);
  border: 1px solid var(--code-border);
  padding: 1px 5px;
  border-radius: 4px;
  color: var(--accent-ink);
}

.code-block {
  margin: 12px 0;
  background: var(--code-bg);
  border: 1px solid var(--code-border);
  border-radius: var(--radius);
  overflow: hidden;
}
.code-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  border-bottom: 1px solid var(--code-border);
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-3);
}
.code-copy {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--ink-3);
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 100ms ease;
}
.code-copy:hover { background: var(--bg-hover); color: var(--ink); }
.code-copy.copied { color: var(--persona-c); }
.code-copy svg { width: 11px; height: 11px; }
.code-block pre {
  margin: 0;
  padding: 12px 14px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.55;
  scrollbar-width: thin;
  background: transparent;
}
.code-block code { background: transparent; border: none; padding: 0; font-family: var(--font-mono); }

.msg-actions {
  display: flex;
  gap: 2px;
  margin-top: 10px;
  opacity: 0;
  transition: opacity 120ms ease;
}
.msg:hover .msg-actions { opacity: 1; }
.msg-action {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border-radius: 5px;
  font-size: 11.5px;
  color: var(--ink-3);
  transition: all 100ms ease;
}
.msg-action:hover { background: var(--bg-hover); color: var(--ink); }
.msg-action svg { width: 12px; height: 12px; }

.streaming-cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  vertical-align: -2px;
  margin-left: 2px;
  animation: blink 1s steps(2) infinite;
  border-radius: 1px;
}
@keyframes blink { 50% { opacity: 0; } }

.streaming-text {
  margin: 0;
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  white-space: pre-wrap;
  word-break: break-word;
  color: inherit;
  background: transparent;
  border: 0;
  padding: 0;
}

.err-card {
  background: color-mix(in oklch, var(--danger) 10%, var(--bg-elev));
  border: 1px solid color-mix(in oklch, var(--danger) 35%, transparent);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 28px;
  color: var(--danger);
  font-size: 13px;
}
.err-title { font-weight: 600; margin-bottom: 4px; }
.err-details { color: var(--ink-3); font-size: 12px; }

/* ===== Composer ===== */
.composer-wrap {
  flex-shrink: 0;
  background: var(--bg);
  padding: 16px 32px 20px;
  border-top: 1px solid var(--border);
}
.composer {
  max-width: 760px;
  margin: 0 auto;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  transition: border-color 120ms ease, box-shadow 120ms ease;
  overflow: hidden;
}
.composer:focus-within {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-lg);
}
.composer-input {
  width: 100%;
  border: none;
  background: transparent;
  outline: none;
  resize: none;
  padding: 14px 16px 4px;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  max-height: 220px;
  min-height: 24px;
  font-family: var(--font-ui);
}
.composer-input::placeholder { color: var(--ink-4); }
.composer-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px 10px;
}
.temp-control {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  height: 30px;
  border-radius: 7px;
  font-size: 12px;
  color: var(--ink-3);
  transition: background 120ms ease;
  user-select: none;
}
.temp-control:hover { background: var(--bg-hover); color: var(--ink); }
.temp-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.02em;
}
.temp-value {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  min-width: 22px;
  text-align: right;
}
.temp-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.temp-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--bg-elev);
  box-shadow: 0 0 0 1px var(--border-strong);
}
.temp-slider::-moz-range-thumb {
  width: 12px; height: 12px;
